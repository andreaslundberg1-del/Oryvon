<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <rect width="100" height="100" rx="16" fill="#020101"/>

  <!-- Outer dashed orbit -->
  <circle cx="50" cy="50" r="46" stroke="#eed078" stroke-width="0.5" stroke-dasharray="1.5 7" opacity="0.4"/>

  <!-- Distant orbit ring -->
  <circle cx="50" cy="50" r="41" stroke="#eed078" stroke-width="0.6" stroke-dasharray="4 6" opacity="0.35"/>

  <!-- Inner rotating dashed ring -->
  <circle cx="50" cy="50" r="35" stroke="#eed078" stroke-width="0.45" stroke-dasharray="2 9" opacity="0.35"/>

  <!-- Main gold ring -->
  <circle cx="50" cy="50" r="30">
    <animate attributeName="r" values="30;30" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="30" stroke="url(#g)" stroke-width="7" fill="none"/>

  <!-- Inner dashed ring -->
  <circle cx="50" cy="50" r="24" stroke="#eed078" stroke-width="0.65" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- Inner orbit -->
  <circle cx="50" cy="50" r="19" stroke="#eed078" stroke-width="0.8" opacity="0.45" stroke-dasharray="1 3"/>

  <!-- Crosshair lines -->
  <line x1="50" y1="12" x2="50" y2="88" stroke="#eed078" stroke-width="0.6" opacity="0.3"/>
  <line x1="12" y1="50" x2="88" y2="50" stroke="#eed078" stroke-width="0.6" opacity="0.3"/>

  <!-- Central glow node -->
  <circle cx="50" cy="50" r="13" fill="url(#glow)"/>
  <circle cx="50" cy="50" r="3" fill="#ffffff"/>

  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffe9a3"/>
      <stop offset="70%" stop-color="#c59635"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffe9a3" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c59635" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
